name: taxonomy-pages
run-name: Publish function taxonomy dashboard

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "include/**"
      - "config/**"
      - "tools/**"
      - ".github/workflows/taxonomy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read
  pages: write

concurrency:
  group: taxonomy-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  OUTPUT: _site
  TAXONOMY_DIR: build/function-taxonomy

jobs:
  build:
    name: Generate taxonomy dashboard
    if: github.repository == 'itsgrimetime/melee'
    runs-on: ubuntu-latest
    container: ghcr.io/itsgrimetime/build-melee:main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git config
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global advice.detachedHead false

      - name: Prepare original DOL data
        run: |
          rm -rf orig
          ln -s /orig orig

      - name: Configure
        run: |
          python3 configure.py \
            --compilers /compilers \
            --max-errors 0 \
            --verbose \
            --version GALE01

      - name: Build report
        run: ninja all_source build/GALE01/report.json

      - name: Generate taxonomy artifacts
        run: |
          python3 tools/function_taxonomy_inventory.py \
            --report build/GALE01/report.json \
            --output "$TAXONOMY_DIR" \
            --workers 4

      - name: Generate dashboard
        run: python3 tools/function_taxonomy_dashboard.py "$TAXONOMY_DIR"

      - name: Assemble Pages site
        run: |
          mkdir -p "_site/taxonomy"
          cp -R "$TAXONOMY_DIR"/. "_site/taxonomy/"
          touch "_site/.nojekyll"
          cat > "_site/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=taxonomy/dashboard.html">
            <title>Melee Function Taxonomy</title>
          </head>
          <body>
            <p><a href="taxonomy/dashboard.html">Open the function taxonomy dashboard</a></p>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.OUTPUT }}

  deploy:
    name: Deploy GitHub Pages
    if: github.repository == 'itsgrimetime/melee' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
